server {
    listen 80;
    server_name ai.lan;

    resolver 127.0.0.11 valid=30s;

    location / {
        proxy_pass http://open-webui:8080;
        include /etc/nginx/proxy_params;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# ============================================================
# Stack: SECURITY
# pihole · crowdsec · nginx · duckdns · wireguard
# ============================================================
# PRIMA VOLTA — ordine obbligatorio:
#   1. docker compose up -d crowdsec
#   2. docker exec crowdsec cscli bouncers add firewall-bouncer
#   3. Copia la chiave → /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
#   4. sudo systemctl start crowdsec-firewall-bouncer
#   5. docker compose up -d
# ============================================================

services:

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      - TZ=Europe/Rome
      - WEBPASSWORD=${PIHOLE_WEBPASSWORD}
      - ServerIP=192.168.0.30
      - DNS1=1.1.1.1
      - DNS2=8.8.8.8
    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/sshd crowdsecurity/nginx
      - GID=1000
    volumes:
      - crowdsec-config:/etc/crowdsec
      - crowdsec-data:/var/lib/crowdsec/data
      - ./nginx/logs:/var/log/nginx:ro
      - /var/log:/var/log/host:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - internal_net
    restart: unless-stopped

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=false
    network_mode: host
    restart: unless-stopped

  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - SERVERURL=${WG_SERVERURL}
      - SERVERPORT=${WG_PORT}
      - PEERS=${WG_PEERS}
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.0.0.0/24
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - wireguard-config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - internal_net
    restart: unless-stopped

volumes:
  pihole-etc:
  pihole-dnsmasq:
  crowdsec-config:
  crowdsec-data:
  wireguard-config:

networks:
  internal_net:
    external: true
#!/usr/sbin/nft -f
# ============================================================
# LabGuard — nftables firewall
# Applicare:  sudo nft -f /etc/nftables.conf
# Verificare: sudo nft list ruleset
#
# PRIMA di applicare:
#   Controlla il nome della tua interfaccia: ip link show
#   Se non è eth0, cambia LAN_IF qui sotto
# ============================================================

flush ruleset

define LAN_NET = 192.168.0.0/24
define LAN_IF  = wlan0
define WG_NET  = 10.0.0.0/24
define WG_PORT = 51820

table inet filter {

    # IP bannati da CrowdSec
    set crowdsec_blacklist {
        type ipv4_addr
        flags dynamic, timeout
        timeout 4h
    }

    chain input {
        type filter hook input priority 0; policy drop;

        iif lo accept
        ct state established,related accept
        ct state invalid drop

        ip saddr @crowdsec_blacklist drop

        # ICMP solo da LAN
        ip protocol icmp ip saddr $LAN_NET accept
        ip6 nexthdr icmpv6 accept

        # SSH solo da LAN
        ip saddr $LAN_NET tcp dport 22 accept

        # DNS (Pi-hole) da LAN e VPN
        ip saddr { $LAN_NET, $WG_NET } tcp dport 53 accept
        ip saddr { $LAN_NET, $WG_NET } udp dport 53 accept

        # HTTP da LAN e VPN
        ip saddr { $LAN_NET, $WG_NET } tcp dport 80 accept

        # WireGuard — aperto da ovunque
        udp dport $WG_PORT accept

        # Mosquitto solo da LAN
        ip saddr $LAN_NET tcp dport 1883 accept
        ip saddr $LAN_NET tcp dport 9001 accept

        log prefix "[nftables DROP] " flags all drop
    }

    chain forward {
        # Policy accept — Docker gestisce le sue regole di forward autonomamente
        # tramite le chain DOCKER e DOCKER-FORWARD in iptables
        type filter hook forward priority 0; policy accept;

        ct state invalid drop

        # WireGuard forward — da abilitare dopo setup wg0
        # iif wg0 oif $LAN_IF accept
        # iif $LAN_IF oif wg0 ct state established,related accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority -100;
        # DNAT WireGuard → container
        udp dport $WG_PORT dnat to 172.22.0.9:51820
    }
    chain postrouting {
        type nat hook postrouting priority 100;
        ip saddr $WG_NET oif $LAN_IF masquerade
        # Docker container traffic
        ip saddr 172.22.0.0/16 oif $LAN_IF masquerade
    }
}